<text x="1050.0" y="58" text-anchor="middle" class="title">图4-1 EISCore系统总体架构图</text>
<rect class="box" x="650" y="120" width="800" height="105"/><text x="1050.0" y="158" text-anchor="middle" class="head">用户访问层</text><text x="1050.0" y="202" text-anchor="middle" class="body">桌面端用户 / 现场业务用户 / 移动端用户</text><rect class="box" x="470" y="310" width="1160" height="190"/><text x="1050.0" y="348" text-anchor="middle" class="head">前端表现层</text><text x="1050.0" y="392" text-anchor="middle" class="body">基座应用（Vue 3 + Vite + qiankun）</text><text x="1050.0" y="428" text-anchor="middle" class="body">HMS / MMS / 应用中心 / 移动端</text><rect class="box" x="560" y="605" width="980" height="105"/><text x="1050.0" y="643" text-anchor="middle" class="head">接口与运行层</text><text x="1050.0" y="687" text-anchor="middle" class="body">PostgREST / Workflow Runtime / Agent Runtime</text><rect class="box" x="420" y="820" width="1260" height="200"/><text x="1050.0" y="858" text-anchor="middle" class="head">数据与治理层</text><text x="1050.0" y="902" text-anchor="middle" class="body">PostgreSQL 16</text><text x="1050.0" y="938" text-anchor="middle" class="body">public / hr / scm / app_center / workflow / app_data</text><text x="1050.0" y="974" text-anchor="middle" class="body">RLS / 轻量语义 / 状态映射</text><rect class="box" x="760" y="1115" width="580" height="85"/><text x="1050.0" y="1153" text-anchor="middle" class="head">支撑环境层</text><text x="1050.0" y="1197" text-anchor="middle" class="body">Docker Compose / PM2</text><rect class="box" x="1460" y="835" width="550" height="205"/><text x="1735.0" y="873" text-anchor="middle" class="head">设计要点</text><text x="1735.0" y="917" text-anchor="middle" class="body">数据库承担核心数据与部分业务约束；</text><text x="1735.0" y="953" text-anchor="middle" class="body">接口层负责统一映射；</text><text x="1735.0" y="989" text-anchor="middle" class="body">前端基座组织各业务子应用；</text><text x="1735.0" y="1025" text-anchor="middle" class="body">流程与语义能力围绕同一底座协同。</text><line class="line" x1="1050" y1="225" x2="1050" y2="310" marker-end="url(#arrow)"/><line class="line" x1="1050" y1="500" x2="1050" y2="605" marker-end="url(#arrow)"/><line class="line" x1="1050" y1="710" x2="1050" y2="820" marker-end="url(#arrow)"/><line class="line" x1="1050" y1="1020" x2="1050" y2="1115" marker-end="url(#arrow)"/><line class="line" x1="1460" y1="930" x2="1680" y2="930" marker-end="url(#arrow)"/></svg>